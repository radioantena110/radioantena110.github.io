<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Antena110</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="player-card">
	<a href="../index.html" class="back-btn">
        <span>«</span> Volver a la Radio
    </a>
        
        
        <div class="cover-wrapper">
            <img id="cover-art" src="" alt="Portada">
        </div>

        <div class="track-info">
            <h2 id="track-title">Cargando...</h2>
            <p id="artist-name">Aerosmith</p>
        </div>

        <div class="progress-area">
            <input type="range" id="progress-bar" value="0">
        </div>

        <div class="controls">
            <button id="prev-btn">⏮</button>
            <button id="play-btn" class="play-btn">▶</button>
            <button id="next-btn">⏭</button>
        </div>

        <ul id="playlist" class="playlist">
            </ul>
    </div>

    <script>
        // --- CONFIGURACIÓN DE LA PLANTILLA ---
        const albumConfig = {
            artist: "Aerosmith",
            cover: "img/aerosmith.png", // Cambia por tu imagen
            tracks: [
               { title: "Amazing", file: "musica/Amazing.mp3" },
               { title: "Angel", file: "musica/Angel.mp3" },
               { title: "Crazy", file: "musica/Crazy.mp3" },
               { title: "Cryin", file: "musica/Cryin.mp3" },
               { title: "Deuces Are Wild", file: "musica/Deuces Are Wild.mp3" },
               { title: "Dream On", file: "musica/Dream On.mp3" },
               { title: "Dude (Looks Like A Lady)", file: "musica/Dude (Looks Like A Lady).mp3" },
               { title: "Girls Of Summer", file: "musica/Girls Of Summer.mp3" },
               { title: "I Dont Want To Miss A Thing", file: "musica/I Dont Want To Miss A Thing.mp3" },
               { title: "Lay It Down", file: "musica/Lay It Down.mp3" },
               { title: "Livin On The Edge", file: "musica/Livin On The Edge.mp3" },
               { title: "Love In An Elevator", file: "musica/Love In An Elevator.mp3" },
               { title: "Mama Kin", file: "musica/Mama Kin.mp3" },
               { title: "Pink", file: "musica/Pink.mp3" },
               { title: "Same Old Song And Dance", file: "musica/Same Old Song And Dance.mp3" },
               { title: "Seasons Of Wither", file: "musica/Seasons Of Wither.mp3" },
               { title: "Walk This Way", file: "musica/Walk This Way.mp3" },
               { title: "What It Takes", file: "musica/What It Takes.mp3" },
            ]
        };

        // --- LÓGICA DEL REPRODUCTOR ---
        let currentTrackIndex = 0;
        const audio = new Audio();
        
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const trackTitle = document.getElementById('track-title');
        const playlistUI = document.getElementById('playlist');

        function init() {
            document.getElementById('artist-name').innerText = albumConfig.artist;
            document.getElementById('cover-art').src = albumConfig.cover;
            
            // Cargar Playlist
            albumConfig.tracks.forEach((track, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${index + 1}. ${track.title}</span>`;
                li.addEventListener('click', () => loadAndPlay(index));
                playlistUI.appendChild(li);
            });

            loadTrack(0);
        }

        function loadTrack(index) {
            currentTrackIndex = index;
            const track = albumConfig.tracks[index];
            audio.src = track.file;
            trackTitle.innerText = track.title;
            
            // Marcar activa en la lista
            const items = playlistUI.querySelectorAll('li');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }

        function loadAndPlay(index) {
            loadTrack(index);
            audio.play();
            playBtn.innerText = "⏸";
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        });

        nextBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex + 1) % albumConfig.tracks.length;
            loadAndPlay(currentTrackIndex);
        });

        prevBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex - 1 + albumConfig.tracks.length) % albumConfig.tracks.length;
            loadAndPlay(currentTrackIndex);
        });

        // Actualizar barra de progreso
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress || 0;
        });

        // Saltos en la barra
        progressBar.addEventListener('input', () => {
            const seekTime = (progressBar.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        });

        // Al terminar una canción, pasar a la siguiente
        audio.addEventListener('ended', () => nextBtn.click());

        init();
    </script>
</body>
</html>
