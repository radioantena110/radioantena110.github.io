<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Antena110</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="player-card">
	<a href="../index.html" class="back-btn" title="Volver al inicio">
    <svg viewBox="0 0 24 24" width="24" height="24">
        <path fill="currentColor" d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" />
    </svg>
    <span>Volver</span>
	</a>
        
        
        <div class="cover-wrapper">
            <img id="cover-art" src="" alt="Portada">
        </div>

        <div class="track-info">
            <h2 id="track-title">Cargando...</h2>
            <p id="artist-name">Fito Paez</p>
        </div>

        <div class="progress-area">
            <input type="range" id="progress-bar" value="0">
        </div>

        <div class="controls">
            <button id="prev-btn">⏮</button>
            <button id="play-btn" class="play-btn">▶</button>
            <button id="next-btn">⏭</button>
        </div>

        <ul id="playlist" class="playlist">
            </ul>
    </div>

    <script>
        // --- CONFIGURACIÓN DE LA PLANTILLA ---
        const albumConfig = {
            artist: "Fito Paez",
            cover: "img/fito.png", // Cambia por tu imagen
            tracks: [
               { title: "11 y 6", file: "musica/11 y 6.mp3" },
               { title: "A rodar la vida", file: "musica/A rodar la vida.mp3" },
               { title: "Ahi voy", file: "musica/Ahi voy.mp3" },
               { title: "Al lado del camino", file: "musica/Al lado del camino.mp3" },
               { title: "Brillante sobre el mic", file: "musica/Brillante sobre el mic.mp3" },
               { title: "Buena estrella", file: "musica/Buena estrella.mp3" },
               { title: "Circo beat", file: "musica/Circo beat.mp3" },
               { title: "Ciudad de pobres corazones", file: "musica/Ciudad de pobres corazones.mp3" },
               { title: "Dar es dar", file: "musica/Dar es dar.mp3" },
               { title: "El amor después del amor", file: "musica/El amor después del amor.mp3" },
               { title: "Es sólo una cuestión de actitud", file: "musica/Es sólo una cuestión de actitud.mp3" },
               { title: "Eso que llevas ahi", file: "musica/Eso que llevas ahi.mp3" },
               { title: "La rueda mágica", file: "musica/La rueda mágica.mp3" },
               { title: "Mariposa tecknicolor", file: "musica/Mariposa tecknicolor.mp3" },
               { title: "Tema de Piluso", file: "musica/Tema de Piluso.mp3" },
               { title: "Tumbas de la gloria", file: "musica/Tumbas de la gloria.mp3" },
               { title: "Un vestido y un amor", file: "musica/Un vestido y un amor.mp3" },
               { title: "Y dale alegría a mi corazón", file: "musica/Y dale alegría a mi corazón.mp3" },
               { title: "Yo Vengo a Ofrecer Mi Corazón", file: "musica/Yo Vengo a Ofrecer Mi Corazón.mp3" },
            ]
        };

        // --- LÓGICA DEL REPRODUCTOR ---
        let currentTrackIndex = 0;
        const audio = new Audio();
        
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const trackTitle = document.getElementById('track-title');
        const playlistUI = document.getElementById('playlist');

        function init() {
            document.getElementById('artist-name').innerText = albumConfig.artist;
            document.getElementById('cover-art').src = albumConfig.cover;
            
            // Cargar Playlist
            albumConfig.tracks.forEach((track, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${index + 1}. ${track.title}</span>`;
                li.addEventListener('click', () => loadAndPlay(index));
                playlistUI.appendChild(li);
            });

            loadTrack(0);
        }

        function loadTrack(index) {
            currentTrackIndex = index;
            const track = albumConfig.tracks[index];
            audio.src = track.file;
            trackTitle.innerText = track.title;
            
            // Marcar activa en la lista
            const items = playlistUI.querySelectorAll('li');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }

        function loadAndPlay(index) {
            loadTrack(index);
            audio.play();
            playBtn.innerText = "⏸";
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        });

        nextBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex + 1) % albumConfig.tracks.length;
            loadAndPlay(currentTrackIndex);
        });

        prevBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex - 1 + albumConfig.tracks.length) % albumConfig.tracks.length;
            loadAndPlay(currentTrackIndex);
        });

        // Actualizar barra de progreso
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress || 0;
        });

        // Saltos en la barra
        progressBar.addEventListener('input', () => {
            const seekTime = (progressBar.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        });

        // Al terminar una canción, pasar a la siguiente
        audio.addEventListener('ended', () => nextBtn.click());

        init();
    </script>
</body>
</html>
