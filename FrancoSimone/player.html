<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Música - Plantilla</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="player-card">
	<a href="../index.html" class="back-btn">
        <span>«</span> Volver a la Radio
    </a>
        
        
        <div class="cover-wrapper">
            <img id="cover-art" src="" alt="Portada">
        </div>

        <div class="track-info">
            <h2 id="track-title">Cargando...</h2>
            <p id="artist-name">Franco Simone</p>
        </div>

        <div class="progress-area">
            <input type="range" id="progress-bar" value="0">
        </div>

        <div class="controls">
            <button id="prev-btn">⏮</button>
            <button id="play-btn" class="play-btn">▶</button>
            <button id="next-btn">⏭</button>
        </div>

        <ul id="playlist" class="playlist">
            </ul>
    </div>

    <script>
        // --- CONFIGURACIÓN DE LA PLANTILLA ---
        const albumConfig = {
            artist: "Franco Simone",
            cover: "img/simone.png", // Cambia por tu imagen
            tracks: [
               { title: "Con los ojos cerrados y puños estrechos", file: "musica/Con los ojos cerrados y puños estrechos.mp3" },
               { title: "Danzas húngaras", file: "musica/Danzas húngaras.mp3" },
               { title: "Duda", file: "musica/Duda.mp3" },
               { title: "El cielo en una habitación", file: "musica/El cielo en una habitación.mp3" },
               { title: "El cómico", file: "musica/El cómico.mp3" },
               { title: "Esta noche", file: "musica/Esta noche.mp3" },
               { title: "Insomnia", file: "musica/Insomnia.mp3" },
               { title: "La llave", file: "musica/La llave.mp3" },
               { title: "Mala droga", file: "musica/Mala droga.mp3" },
               { title: "Montmatre", file: "musica/Montmatre.mp3" },
               { title: "Mágica", file: "musica/Mágica.mp3" },
               { title: "Ni una sombra de amor", file: "musica/Ni una sombra de amor.mp3" },
               { title: "Paisaje", file: "musica/Paisaje.mp3" },
               { title: "Respiro", file: "musica/Respiro.mp3" },
               { title: "Río grande", file: "musica/Río grande.mp3" },
               { title: "Tentación", file: "musica/Tentación.mp3" },
               { title: "Tu, siempre tu", file: "musica/Tu, siempre tu.mp3" },
			   { title: "Deseos", file: "musica/Deseos.mp3" },
			   { title: "Amazonas", file: "musica/Amazonas.mp3" },
			   { title: "Mala droga", file: "musica/Mala droga.mp3" },
			   { title: "El mar parece cerca", file: "musica/El mar parece cerca.mp3" },
            ] 
        };

        // --- LÓGICA DEL REPRODUCTOR ---
        let currentTrackIndex = 0;
        const audio = new Audio();
        
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const trackTitle = document.getElementById('track-title');
        const playlistUI = document.getElementById('playlist');

        function init() {
            document.getElementById('artist-name').innerText = albumConfig.artist;
            document.getElementById('cover-art').src = albumConfig.cover;
            
            // Cargar Playlist
            albumConfig.tracks.forEach((track, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${index + 1}. ${track.title}</span>`;
                li.addEventListener('click', () => loadAndPlay(index));
                playlistUI.appendChild(li);
            });

            loadTrack(0);
        }

        function loadTrack(index) {
            currentTrackIndex = index;
            const track = albumConfig.tracks[index];
            audio.src = track.file;
            trackTitle.innerText = track.title;
            
            // Marcar activa en la lista
            const items = playlistUI.querySelectorAll('li');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }

        function loadAndPlay(index) {
            loadTrack(index);
            audio.play();
            playBtn.innerText = "⏸";
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        });

        nextBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex + 1) % albumConfig.tracks.length;
            loadAndPlay(currentTrackIndex);
        });

        prevBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex - 1 + albumConfig.tracks.length) % albumConfig.tracks.length;
            loadAndPlay(currentTrackIndex);
        });

        // Actualizar barra de progreso
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress || 0;
        });

        // Saltos en la barra
        progressBar.addEventListener('input', () => {
            const seekTime = (progressBar.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        });

        // Al terminar una canción, pasar a la siguiente
        audio.addEventListener('ended', () => nextBtn.click());

        init();
    </script>
</body>
</html>
