<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Antena110</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="player-card">
	<a href="../index.html" class="back-btn">
        <span>«</span> Volver a la Radio
    </a>
        
        
        <div class="cover-wrapper">
            <img id="cover-art" src="" alt="Portada">
        </div>

        <div class="track-info">
            <h2 id="track-title">Cargando...</h2>
            <p id="artist-name">Divididos</p>
        </div>

        <div class="progress-area">
            <input type="range" id="progress-bar" value="0">
        </div>

        <div class="controls">
            <button id="prev-btn">⏮</button>
            <button id="play-btn" class="play-btn">▶</button>
            <button id="next-btn">⏭</button>
        </div>

        <ul id="playlist" class="playlist">
            </ul>
    </div>

    <script>
        // --- CONFIGURACIÓN DE LA PLANTILLA ---
        const albumConfig = {
            artist: "Divididos",
            cover: "img/divididos.png", // Cambia por tu imagen
            tracks: [
               { title: "01 - Salir a Asustar", file: "musica/01 - Salir a Asustar.mp3" },
               { title: "02 - Ortega y Gases", file: "musica/02 - Ortega y Gases.mp3" },
               { title: "03 - El Arriero", file: "musica/03 - El Arriero.mp3" },
               { title: "04 - Salir a Comprar", file: "musica/04 - Salir a Comprar.mp3" },
               { title: "05 - Que ves", file: "musica/05 - Que ves.mp3" },
               { title: "06 - Pestana de Camello", file: "musica/06 - Pestana de Camello.mp3" },
               { title: "07 - Rasputin - Hey jude", file: "musica/07 - Rasputin - Hey jude.mp3" },
               { title: "08 - Dame un limon", file: "musica/08 - Dame un limon.mp3" },
               { title: "09 - Paisano de Hurlingham", file: "musica/09 - Paisano de Hurlingham.mp3" },
               { title: "10 - Cristofolo Cacarnu", file: "musica/10 - Cristofolo Cacarnu.mp3" },
               { title: "11 - Indio Deja El Mezcal", file: "musica/11 - Indio Deja El Mezcal.mp3" },
               { title: "12 - Huelga de amores", file: "musica/12 - Huelga de amores.mp3" },
               { title: "13 - Tajo C", file: "musica/13 - Tajo C.mp3" },
               { title: "14 - Pestaña de Camello", file: "musica/14 - Pestaña de Camello.mp3" },
            ]
        };

        // --- LÓGICA DEL REPRODUCTOR ---
        let currentTrackIndex = 0;
        const audio = new Audio();
        
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const trackTitle = document.getElementById('track-title');
        const playlistUI = document.getElementById('playlist');

        function init() {
            document.getElementById('artist-name').innerText = albumConfig.artist;
            document.getElementById('cover-art').src = albumConfig.cover;
            
            // Cargar Playlist
            albumConfig.tracks.forEach((track, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${index + 1}. ${track.title}</span>`;
                li.addEventListener('click', () => loadAndPlay(index));
                playlistUI.appendChild(li);
            });

            loadTrack(0);
        }

        function loadTrack(index) {
            currentTrackIndex = index;
            const track = albumConfig.tracks[index];
            audio.src = track.file;
            trackTitle.innerText = track.title;
            
            // Marcar activa en la lista
            const items = playlistUI.querySelectorAll('li');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }

        function loadAndPlay(index) {
            loadTrack(index);
            audio.play();
            playBtn.innerText = "⏸";
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        });

        nextBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex + 1) % albumConfig.tracks.length;
            loadAndPlay(currentTrackIndex);
        });

        prevBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex - 1 + albumConfig.tracks.length) % albumConfig.tracks.length;
            loadAndPlay(currentTrackIndex);
        });

        // Actualizar barra de progreso
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress || 0;
        });

        // Saltos en la barra
        progressBar.addEventListener('input', () => {
            const seekTime = (progressBar.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        });

        // Al terminar una canción, pasar a la siguiente
        audio.addEventListener('ended', () => nextBtn.click());

        init();
    </script>
</body>
</html>
